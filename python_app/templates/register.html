{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<h1>Create Account</h1>
<form id="register-form" class="auth-form">
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" minlength="3" maxlength="50" required>
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="6" required>
    </div>
    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" maxlength="100" required>
    </div>
    <div class="form-group">
        <label for="phone">Phone (optional)</label>
        <input type="text" id="phone" name="phone" maxlength="20">
    </div>
    <button type="submit" class="btn">Register</button>
    <p id="register-error" class="error" style="display:none;"></p>
    <p id="register-success" class="success" style="display:none;"></p>
</form>
<p>Already have an account? <a href="/login">Login here</a></p>

{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('register-error');
    const successEl = document.getElementById('register-success');
    errEl.style.display = 'none';
    successEl.style.display = 'none';

    const body = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        name: document.getElementById('name').value,
    };
    const phone = document.getElementById('phone').value;
    if (phone) body.phone = phone;

    const resp = await fetch('/api/v1/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });
    if (resp.ok) {
        successEl.textContent = 'Account created! Redirecting to login...';
        successEl.style.display = 'block';
        setTimeout(() => { window.location.href = '/login'; }, 1500);
    } else {
        const err = await resp.json();
        errEl.textContent = err.detail || 'Registration failed';
        errEl.style.display = 'block';
    }
});
</script>
{% endblock %}
