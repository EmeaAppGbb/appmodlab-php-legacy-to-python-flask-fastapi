version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html/
    depends_on:
      - db
    networks:
      - citypulse

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: citypulse_events
      MYSQL_USER: citypulse_user
      MYSQL_PASSWORD: citypulse123
    ports:
      - "3306:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
      - mysql_data:/var/lib/mysql
    networks:
      - citypulse

networks:
  citypulse:

volumes:
  mysql_data:
